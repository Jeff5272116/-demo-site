<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>師傅請款系統（管理員端）— Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft JhengHei","PingFang TC",system-ui,sans-serif; background:#f4f6f9; color:#1f2937; line-height:1.6; }
  header { background:#3b1e5f; color:#fff; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  header h1 { font-size:18px; font-weight:600; }
  header .sub { font-size:12px; opacity:.75; }
  .who { background:#7c3aed; padding:6px 14px; border-radius:999px; font-size:14px; font-weight:600; }
  nav { background:#fff; border-bottom:1px solid #e5e7eb; padding:0 24px; display:flex; gap:4px; flex-wrap:wrap; }
  nav button { background:none; border:none; padding:14px 18px; cursor:pointer; font-size:15px; color:#6b7280; border-bottom:3px solid transparent; }
  nav button.active { color:#5b21b6; border-bottom-color:#5b21b6; font-weight:600; }
  nav button:hover { color:#5b21b6; }
  main { max-width:1000px; margin:24px auto; padding:0 24px; }
  .tab { display:none; } .tab.active { display:block; }
  .card { background:#fff; border-radius:10px; padding:22px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:20px; }
  .card h2 { font-size:17px; margin-bottom:4px; }
  .card .hint { font-size:13px; color:#6b7280; margin-bottom:18px; }
  label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:#374151; }
  .field { margin-bottom:16px; }
  select, input { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:7px; font-size:15px; background:#fff; }
  input[type="checkbox"] { width:auto; cursor:pointer; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .btn { background:#5b21b6; color:#fff; border:none; padding:11px 22px; border-radius:7px; font-size:15px; cursor:pointer; font-weight:600; }
  .btn:hover { background:#4c1d95; }
  .btn-sm { padding:6px 12px; font-size:13px; border-radius:6px; }
  .btn-green { background:#059669; } .btn-green:hover { background:#047857; }
  .btn-red { background:#dc2626; } .btn-red:hover { background:#b91c1c; }
  .btn-ghost { background:#fff; color:#5b21b6; border:1px solid #cbd5e1; } .btn-ghost:hover { background:#f5f3ff; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:10px 12px; border-bottom:1px solid #eef0f3; }
  th { font-size:12px; color:#6b7280; background:#fafbfc; }
  tr:hover td { background:#fafbfc; }
  .badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; }
  .badge.pending { background:#fef3c7; color:#92400e; }
  .badge.approved { background:#d1fae5; color:#065f46; }
  .badge.rejected { background:#fee2e2; color:#991b1b; }
  .dup-flag { background:#fff7ed; color:#c2410c; border:1px solid #fdba74; font-size:11px; padding:2px 7px; border-radius:5px; margin-left:6px; }
  tr.dup td { background:#fffaf5 !important; }
  tr.grp td { background:#f5f3ff; border-top:2px solid #ede9fe; }
  tr.grp:hover td { background:#f5f3ff; }
  .bulkbar { display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:10px 4px; margin-bottom:8px; border-bottom:1px solid #eef0f3; }
  .bulkbar label { font-size:14px; font-weight:600; margin-bottom:0; display:inline-flex; align-items:center; gap:6px; cursor:pointer; }
  .bulkbar .sel-count { font-size:13px; color:#6b7280; }
  .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .stat { background:#fff; border-radius:10px; padding:18px 20px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .stat .num { font-size:28px; font-weight:700; color:#5b21b6; } .stat .lbl { font-size:13px; color:#6b7280; }
  .empty { text-align:center; color:#9ca3af; padding:30px; font-size:14px; }
  .demo-note { font-size:12px; color:#92400e; background:#fffbeb; border:1px solid #fde68a; border-radius:6px; padding:8px 12px; margin-bottom:16px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1f2937; color:#fff; padding:12px 22px; border-radius:8px; font-size:14px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:99; }
  .toast.show { opacity:1; } .toast.warn { background:#c2410c; }
  tr.detail td { padding:0 8px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>師傅請款與專案成本管理系統</h1>
  </div>
  <div class="who">🛠 最高管理者</div>
</header>

<nav id="nav">
  <button class="active" onclick="showTab('review',this)">請款審核</button>
  <button onclick="showTab('all',this)">全部請款紀錄</button>
  <button onclick="showTab('prices',this)">專案／單價</button>
  <button onclick="showTab('users',this)">使用者管理</button>
  <button onclick="showTab('dash',this)">報表儀表板</button>
</nav>

<main>
  <!-- 請款審核（規格 4.4 / 4.5）-->
  <section class="tab active" id="tab-review">
    <div class="card">
      <h2>請款審核</h2>
      <div id="review-table"></div>
    </div>
  </section>

  <!-- 全部請款紀錄 -->
  <section class="tab" id="tab-all">
    <div class="card">
      <h2>全部請款紀錄</h2>
      <div id="all-filter" style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap"></div>
      <div id="all-table"></div>
    </div>
  </section>

  <!-- 專案／單價（規格 4.6 / 5.2 / 5.3）-->
  <section class="tab" id="tab-prices">
    <div class="card">
      <h2>建案管理</h2>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <input id="np-name" placeholder="建案名稱" style="max-width:220px">
        <input id="np-loc" placeholder="建案地點" style="max-width:220px">
        <button class="btn btn-sm" onclick="addProject()">＋ 新增建案</button>
      </div>
      <div id="proj-list"></div>
    </div>
    <div class="card">
      <h2>單價維護</h2>
      <div id="price-table"></div>
      <div class="demo-note" style="margin-top:16px">新增／更新單價（依建案＋規格）</div>
      <div class="grid2">
        <div class="field"><label>建案</label><select id="up-project"></select></div>
        <div class="field"><label>規格類型</label><select id="up-spec"><option>制式</option><option>客變</option></select></div>
      </div>
      <div class="grid2">
        <div class="field"><label>單價</label><input type="number" id="up-price" min="0" placeholder="例：800"></div>
        <div class="field"><label>制式預填數量（客變免填）</label><input type="number" id="up-qty" min="0" placeholder="選填"></div>
      </div>
      <button class="btn btn-sm" onclick="addUnitPrice()">＋ 新增／更新單價</button>
    </div>
  </section>

  <!-- 使用者管理（規格 3 / 5.1）-->
  <section class="tab" id="tab-users">
    <div class="card">
      <h2>使用者 / 權限管理</h2>
      <div id="user-table"></div>
      <div class="demo-note" style="margin-top:16px">新增使用者</div>
      <div class="grid2">
        <div class="field"><label>姓名</label><input id="nu-name" placeholder="例：王五"></div>
        <div class="field"><label>登入帳號</label><input id="nu-acct" placeholder="例：wang"></div>
      </div>
      <div class="field"><label>角色</label>
        <select id="nu-role"><option value="worker">師傅</option><option value="admin">最高管理者</option><option value="third_party">第三方</option></select>
      </div>
      <button class="btn btn-sm" onclick="addUser()">＋ 新增使用者</button>
    </div>
  </section>

  <!-- 報表儀表板（規格 4.8）-->
  <section class="tab" id="tab-dash">
    <div class="card">
      <h2>報表與儀表板</h2>
      <div class="stat-grid" style="margin-bottom:22px">
        <div class="stat"><div class="num" id="d-total">$0</div><div class="lbl">本期請款總額</div></div>
        <div class="stat"><div class="num" id="d-pending">0</div><div class="lbl">待審核件數</div></div>
        <div class="stat"><div class="num" id="d-rejected">0</div><div class="lbl">已退回件數</div></div>
      </div>
      <h2 style="font-size:15px;margin:24px 0 6px">各建案明細</h2>
      <div id="d-detail"></div>
      <hr style="border:none;border-top:1px solid #eef0f3;margin:20px 0">
      <h2 style="font-size:15px;margin-bottom:6px">對帳與銀行匯出</h2>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ 匯出對帳檔（CSV）</button>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
/* ===== 參照資料（示範用）===== */
// users（規格 5.1）
let USERS = [
  { id:1, name:'張三', account:'chang', role:'worker', status:'啟用' },
  { id:2, name:'李四', account:'lee',   role:'worker', status:'啟用' },
  { id:3, name:'王五', account:'wang',  role:'worker', status:'啟用' },
  { id:9, name:'系統管理者', account:'admin', role:'admin', status:'啟用' },
];
let userSeq = 100;
const ADMIN_ID = 9;
const ROLE_LABEL = { worker:'師傅', admin:'最高管理者', third_party:'第三方' };
function userName(id){ const u = USERS.find(u=>u.id===id); return u?u.name:('#'+id); }
// projects — 每個建案有名稱、地點、結案狀態（closed:true=已結案）
let PROJECTS = [
  { id:1, name:'建案A', code:'A-001', location:'台北市信義區', closed:false },
  { id:2, name:'建案B', code:'B-002', location:'新北市板橋區', closed:false },
  { id:3, name:'建案C', code:'C-003', location:'台中市西屯區', closed:true  },
  { id:4, name:'建案D', code:'D-004', location:'桃園市中壢區', closed:false },
  { id:5, name:'建案E', code:'E-005', location:'高雄市左營區', closed:false },
];
// 樓層固定顯示順序（地下一樓 → 五樓）
const FLOOR_ORDER = ['地下一樓','一樓','二樓','三樓','四樓','五樓'];
function floorRank(f){ const i = FLOOR_ORDER.indexOf(f); return i<0 ? 99 : i; }
let projectSeq = 10;
function projectName(id){ const p = PROJECTS.find(p=>p.id===id); return p?p.name:('#'+id); }
// unit_prices（規格 5.3）— 工作項目簡化為「制式／客變」，依案名取單價；制式可預填標準數量，客變留空
let UNIT_PRICES = [
  { id:1,  project_id:1, spec_type:'制式', default_qty:10,   unit_price:800  },
  { id:2,  project_id:1, spec_type:'客變', default_qty:null, unit_price:1200 },
  { id:3,  project_id:2, spec_type:'制式', default_qty:8,    unit_price:900  },
  { id:4,  project_id:2, spec_type:'客變', default_qty:null, unit_price:1300 },
  { id:5,  project_id:3, spec_type:'制式', default_qty:10,   unit_price:850  },
  { id:6,  project_id:3, spec_type:'客變', default_qty:null, unit_price:1250 },
  { id:7,  project_id:4, spec_type:'制式', default_qty:12,   unit_price:950  },
  { id:8,  project_id:4, spec_type:'客變', default_qty:null, unit_price:1400 },
  { id:9,  project_id:5, spec_type:'制式', default_qty:6,    unit_price:1000 },
  { id:10, project_id:5, spec_type:'客變', default_qty:null, unit_price:1500 },
];
let unitSeq = 100;
const STATUS_LABEL = { pending:'待審核', approved:'已批准', rejected:'已駁回' };
const TODAY = new Date().toISOString().slice(0,10);
function nowTime(){ return new Date().toTimeString().slice(0,8); }
function nowDateTime(){ const d=new Date(); return d.toISOString().slice(0,10)+' '+d.toTimeString().slice(0,8); }  // 年-月-日 時:分:秒

/* 兩張交易資料表（記憶體模擬 DB）*/
let billingSeq = 0, historySeq = 0;
let billing_records = [];   // 規格 5.4
let status_history  = [];   // 規格 5.5
function addHistory(record_id, from_status, to_status, actor_id, note='') {
  status_history.push({ id:++historySeq, record_id, from_status, to_status, actor_id, note, created_at:nowTime() });
}

/* 預植示範資料（讓審核流程有東西可演）*/
function seed(worker_id, project_id, floor, spec_type, quantity, finalStatus, reason, reviewedAt) {
  const u = UNIT_PRICES.find(x=>x.project_id===project_id && x.spec_type===spec_type);
  const unit_price_snapshot = u.unit_price, amount = unit_price_snapshot*quantity;
  const unique_key = `${project_id}｜${floor}｜${spec_type}｜${TODAY}`;
  const dup = billing_records.some(r=>r.unique_key===unique_key && r.status!=='rejected');
  const r = { id:++billingSeq, worker_id, project_id, floor, item_name:spec_type, spec_type, quantity,
    unit_price_snapshot, amount, unique_key, status:'pending',
    reviewed_by:null, reviewed_at:null, reject_reason:null, submitted_at:TODAY, _suspect:dup };
  billing_records.push(r);
  addHistory(r.id, null, 'pending', worker_id, dup?'疑似重複':'');
  if (finalStatus !== 'pending') {
    r.status = finalStatus; r.reviewed_by = ADMIN_ID; r.reviewed_at = reviewedAt || (TODAY+' 10:00:00');
    if (finalStatus==='rejected') r.reject_reason = reason;
    addHistory(r.id, 'pending', finalStatus, ADMIN_ID, reason||'');
  }
}
seed(1, 1, '二樓',     '制式', 10, 'approved', null, '2026-05-21 09:15:30');
seed(1, 2, '三樓',     '制式', 8,  'pending');
seed(2, 3, '一樓',     '制式', 5,  'pending');
seed(2, 1, '二樓',     '制式', 10, 'pending');   // 與第 1 筆同 unique_key → 疑似重複
seed(2, 4, '地下一樓', '客變', 3,  'rejected', '數量與現場不符，請重新確認', '2026-06-01 14:22:10');
seed(3, 5, '四樓',     '客變', 6,  'approved', null, '2026-05-31 10:05:00');
seed(3, 2, '五樓',     '制式', 8,  'approved', null, '2026-05-29 16:40:12');
seed(1, 3, '二樓',     '客變', 4,  'approved', null, '2026-05-25 11:18:45');

/* ===== 分頁 ===== */
function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (id==='review') renderReview();
  if (id==='all') renderAll();
  if (id==='prices') renderPrices();
  if (id==='users') renderUsers();
  if (id==='dash') renderDash();
}

/* ===== 審核（規格 4.5）+ 寫入呈現 ===== */
function isDup(r){ return billing_records.some(x => x.id!==r.id && x.unique_key===r.unique_key && x.status!=='rejected'); }
function renderReview() {
  const pend = billing_records.filter(r=>r.status==='pending');
  const box = document.getElementById('review-table');
  if (!pend.length) { box.innerHTML='<div class="empty">目前沒有待審核項目 🎉</div>'; return; }
  let h = `<div class="bulkbar">
      <label><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"> 全選</label>
      <span id="sel-count" class="sel-count">已選 0 筆</span><span style="flex:1"></span>
      <button class="btn btn-sm btn-green" onclick="batchApprove()">批次批准</button>
      <button class="btn btn-sm btn-red" onclick="batchReject()">批次退回</button>
    </div>`;
  h += `<table><thead><tr><th style="width:34px"></th><th>師傅</th><th>建案</th><th>樓層</th><th>規格</th><th>數量</th><th>金額</th><th>操作</th></tr></thead><tbody>`;
  pend.forEach(r => {
    const dup = isDup(r);
    h += `<tr class="${dup?'dup':''}">
      <td><input type="checkbox" class="rev-chk" value="${r.id}" onchange="updateSelCount()"></td>
      <td>${userName(r.worker_id)}</td><td>${projectName(r.project_id)}</td><td>${r.floor}</td>
      <td>${r.spec_type}${dup?'<span class="dup-flag">疑似重複</span>':''}</td>
      <td>${r.quantity}</td><td>$${r.amount.toLocaleString()}</td>
      <td><button class="btn btn-sm btn-green" onclick="approve(${r.id},${dup})">批准</button>
          <button class="btn btn-sm btn-red" onclick="reject(${r.id})">退回</button></td></tr>`;
  });
  box.innerHTML = h + '</tbody></table>';
  updateSelCount();
}
function selectedIds(){ return [...document.querySelectorAll('.rev-chk:checked')].map(c=>+c.value); }
function updateSelCount(){
  const total = document.querySelectorAll('.rev-chk').length, n = selectedIds().length;
  const cnt = document.getElementById('sel-count'); if (cnt) cnt.textContent = '已選 '+n+' 筆';
  const all = document.getElementById('chk-all'); if (all) all.checked = n>0 && n===total;
}
function toggleAll(on){ document.querySelectorAll('.rev-chk').forEach(c=>c.checked=on); updateSelCount(); }

/* 狀態變更：更新狀態並記錄審核時間 */
function setStatus(id, status, reason=null) {
  const r = billing_records.find(x=>x.id===id);
  const from = r.status;
  r.status = status; r.reviewed_by = ADMIN_ID; r.reviewed_at = nowDateTime();
  if (reason!==null) r.reject_reason = reason;
  addHistory(r.id, from, status, ADMIN_ID, reason||'');
}
function approve(id, dup) {
  if (dup && !confirm('此筆為疑似重複，確定仍要批准？')) return;
  setStatus(id, 'approved'); toast('已批准 1 筆'); renderReview();
}
function reject(id) {
  const reason = prompt('請填寫退回原因：', '');
  if (reason===null) return;
  setStatus(id, 'rejected', reason || '（未填寫）'); toast('已退回 1 筆'); renderReview();
}
function batchApprove() {
  const ids = selectedIds();
  if (!ids.length) return toast('請先勾選要批准的項目', true);
  const dupN = ids.filter(id=>isDup(billing_records.find(r=>r.id===id))).length;
  if (dupN && !confirm('所選有 '+dupN+' 筆疑似重複，確定仍要全部批准？')) return;
  ids.forEach(id=>setStatus(id,'approved')); toast('已批准 '+ids.length+' 筆'); renderReview();
}
function batchReject() {
  const ids = selectedIds();
  if (!ids.length) return toast('請先勾選要退回的項目', true);
  const reason = prompt('請填寫退回原因（套用至所選 '+ids.length+' 筆）：', '');
  if (reason===null) return;
  ids.forEach(id=>setStatus(id,'rejected', reason||'（未填寫）')); toast('已退回 '+ids.length+' 筆'); renderReview();
}

/* ===== 全部請款 ===== */
let allFilter = 'all';
function setAllFilter(f){ allFilter=f; renderAll(); }
function renderAll() {
  const map = { all:'全部', pending:'待審核', approved:'已批准', rejected:'已駁回' };
  document.getElementById('all-filter').innerHTML = Object.entries(map).map(([k,v])=>{
    const n = k==='all'?billing_records.length:billing_records.filter(r=>r.status===k).length;
    return `<button class="btn btn-sm ${allFilter===k?'':'btn-ghost'}" onclick="setAllFilter('${k}')">${v}（${n}）</button>`;
  }).join('');
  const rows = allFilter==='all'?billing_records:billing_records.filter(r=>r.status===allFilter);
  if (!rows.length) { document.getElementById('all-table').innerHTML='<div class="empty">無資料</div>'; return; }
  let h = `<table><thead><tr><th>師傅</th><th>建案</th><th>樓層</th><th>規格</th><th>數量</th><th>金額</th><th>狀態</th><th>提交日期</th></tr></thead><tbody>`;
  rows.forEach(r => {
    h += `<tr><td>${userName(r.worker_id)}</td><td>${projectName(r.project_id)}</td><td>${r.floor}</td><td>${r.spec_type}</td>
      <td>${r.quantity}</td><td>$${r.amount.toLocaleString()}</td><td><span class="badge ${r.status}">${STATUS_LABEL[r.status]}</span></td><td>${r.submitted_at}</td></tr>`;
  });
  document.getElementById('all-table').innerHTML = h + '</tbody></table>';
}

/* ===== 專案／單價（規格 4.6 / 5.2 / 5.3）===== */
function renderPrices() {
  document.getElementById('proj-list').innerHTML = '<table><thead><tr><th>建案</th><th>地點</th><th>案號</th><th>結案狀態</th><th>規格項目數</th></tr></thead><tbody>' +
    PROJECTS.map(p=>`<tr><td>${p.name}</td><td>${p.location||'—'}</td><td>${p.code||'—'}</td><td>${p.closed?'已結案':'未結案'}</td><td>${UNIT_PRICES.filter(x=>x.project_id===p.id).length}</td></tr>`).join('') + '</tbody></table>';
  let h = `<table><thead><tr><th>建案</th><th>規格</th><th>單價</th><th>制式預填數量</th><th>操作</th></tr></thead><tbody>`;
  UNIT_PRICES.forEach((u,i)=>{ h += `<tr><td>${projectName(u.project_id)}</td><td>${u.spec_type}</td>
    <td><input type="number" value="${u.unit_price}" style="width:110px;padding:5px 8px" onchange="editPrice(${i},this.value)"></td>
    <td>${u.default_qty??'—'}</td><td><button class="btn btn-sm btn-red" onclick="delPrice(${i})">刪除</button></td></tr>`; });
  document.getElementById('price-table').innerHTML = h + '</tbody></table>';
  document.getElementById('up-project').innerHTML = PROJECTS.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
}
function addProject(){
  const name = document.getElementById('np-name').value.trim();
  const location = document.getElementById('np-loc').value.trim();
  if (!name) return toast('請輸入建案名稱',true);
  if (PROJECTS.some(p=>p.name===name)) return toast('建案名稱已存在',true);
  PROJECTS.push({ id:++projectSeq, name, code:'', location, closed:false });
  document.getElementById('np-name').value=''; document.getElementById('np-loc').value='';
  renderPrices(); toast('已新增建案：'+name);
}
function editPrice(i,v){ UNIT_PRICES[i].unit_price=+v||0; toast('單價已更新（僅影響日後新請款）'); }
function delPrice(i){ if(!confirm('確定刪除此單價項目？'))return; UNIT_PRICES.splice(i,1); renderPrices(); }
function addUnitPrice(){
  const project_id=+document.getElementById('up-project').value;
  const spec_type=document.getElementById('up-spec').value, unit_price=+document.getElementById('up-price').value, qtyRaw=document.getElementById('up-qty').value;
  if (!unit_price) return toast('請填寫單價',true);
  const default_qty = spec_type==='制式' ? (qtyRaw===''?null:+qtyRaw) : null;  // 客變不預填
  const exist = UNIT_PRICES.find(u=>u.project_id===project_id && u.spec_type===spec_type);
  if (exist){ exist.unit_price=unit_price; exist.default_qty=default_qty; toast('已更新單價（'+projectName(project_id)+'／'+spec_type+'）'); }
  else { UNIT_PRICES.push({ id:++unitSeq, project_id, spec_type, default_qty, unit_price }); toast('已新增單價'); }
  document.getElementById('up-price').value=''; document.getElementById('up-qty').value='';
  renderPrices();
}

/* ===== 使用者管理（規格 5.1）===== */
function renderUsers() {
  let h = `<table><thead><tr><th>姓名</th><th>帳號</th><th>角色</th><th>狀態</th><th>操作</th></tr></thead><tbody>`;
  USERS.forEach(u=>{ h += `<tr><td>${u.name}</td><td>${u.account}</td><td>${ROLE_LABEL[u.role]}</td>
    <td><span class="badge ${u.status==='啟用'?'approved':'rejected'}">${u.status}</span></td>
    <td><button class="btn btn-sm btn-ghost" onclick="toggleUser(${u.id})">${u.status==='啟用'?'停用':'啟用'}</button></td></tr>`; });
  document.getElementById('user-table').innerHTML = h + '</tbody></table>';
}
function addUser(){
  const name=document.getElementById('nu-name').value.trim(), account=document.getElementById('nu-acct').value.trim(), role=document.getElementById('nu-role').value;
  if (!name||!account) return toast('請填寫姓名與帳號',true);
  if (USERS.some(u=>u.account===account)) return toast('帳號已存在',true);
  USERS.push({ id:++userSeq, name, account, role, status:'啟用' });
  document.getElementById('nu-name').value=''; document.getElementById('nu-acct').value=''; renderUsers(); toast('已新增使用者：'+name);
}
function toggleUser(id){ const u=USERS.find(u=>u.id===id); u.status=u.status==='啟用'?'停用':'啟用'; renderUsers(); }

/* ===== 報表儀表板 ===== */
function renderDash() {
  const appr = billing_records.filter(r=>r.status==='approved');
  document.getElementById('d-total').textContent = '$'+appr.reduce((s,r)=>s+r.amount,0).toLocaleString();
  document.getElementById('d-pending').textContent = billing_records.filter(r=>r.status==='pending').length;
  document.getElementById('d-rejected').textContent = billing_records.filter(r=>r.status==='rejected').length;
  // 各建案清單：建案／地點／結案狀態（按鈕切換）；左側勾選＝對帳匯出選取（預設全選）；點列展開明細
  let dh = `<table><thead><tr>
      <th style="width:34px"><input type="checkbox" id="exp-all" checked onchange="toggleExpAll(this.checked)"></th>
      <th>建案</th><th>地點</th><th>狀態</th><th style="width:90px;text-align:right">明細</th></tr></thead><tbody>`;
  PROJECTS.forEach(p => {
    dh += `<tr class="grp" style="cursor:pointer" onclick="toggleProject(${p.id})">
      <td><input type="checkbox" class="exp-proj" value="${p.id}" checked onclick="event.stopPropagation();syncExpAll()"></td>
      <td><b>${p.name}</b></td>
      <td>${p.location||'—'}</td>
      <td><button class="btn btn-sm ${p.closed?'btn-green':'btn-ghost'}" onclick="event.stopPropagation();toggleClosed(${p.id},this)">${p.closed?'已結案':'未結案'}</button></td>
      <td style="text-align:right"><span id="caret-${p.id}">展開 ▸</span></td></tr>`;
    // 明細：該建案「已通過」請款，依樓層固定順序排列
    const rows = appr.filter(r=>r.project_id===p.id).sort((a,b)=>floorRank(a.floor)-floorRank(b.floor));
    let inner;
    if (!rows.length) {
      inner = `<div class="empty" style="padding:14px">此建案目前沒有已通過的請款</div>`;
    } else {
      inner = `<table style="margin:6px 0"><thead><tr><th>審核通過時間</th><th>員工</th><th>建案</th><th>樓層</th><th>規格</th><th>數量</th><th>單價</th><th>總額</th><th>狀態</th></tr></thead><tbody>`;
      rows.forEach(r => {
        inner += `<tr><td>${r.reviewed_at||'—'}</td><td>${userName(r.worker_id)}</td><td>${p.name}</td>
          <td>${r.floor}</td><td>${r.spec_type}</td><td>${r.quantity}</td>
          <td>$${r.unit_price_snapshot.toLocaleString()}</td><td>$${r.amount.toLocaleString()}</td>
          <td><span class="badge approved">已通過</span></td></tr>`;
      });
      inner += `</tbody></table>`;
    }
    dh += `<tr class="detail" id="detail-${p.id}" style="display:none"><td colspan="5" style="background:#faf9ff">${inner}</td></tr>`;
  });
  document.getElementById('d-detail').innerHTML = dh + '</tbody></table>';
}
function toggleProject(pid){
  const d = document.getElementById('detail-'+pid), c = document.getElementById('caret-'+pid);
  if (!d) return;
  const show = d.style.display==='none';
  d.style.display = show ? 'table-row' : 'none';
  if (c) c.textContent = show ? '收合 ▾' : '展開 ▸';
}
function toggleClosed(pid, btn){
  const p = PROJECTS.find(x=>x.id===pid); if(!p) return;
  p.closed = !p.closed;
  btn.textContent = p.closed ? '已結案' : '未結案';
  btn.className = 'btn btn-sm ' + (p.closed ? 'btn-green' : 'btn-ghost');
}
function toggleExpAll(on){ document.querySelectorAll('.exp-proj').forEach(c=>c.checked=on); }
function syncExpAll(){ const b=[...document.querySelectorAll('.exp-proj')], a=document.getElementById('exp-all'); if(a) a.checked = b.length>0 && b.every(c=>c.checked); }

/* ===== 對帳匯出（規格 4.7）===== */
function exportCSV() {
  const checked = [...document.querySelectorAll('.exp-proj:checked')].map(c=>+c.value);
  if (!checked.length) return toast('請至少勾選一個建案',true);
  const appr = billing_records.filter(r=>r.status==='approved' && checked.includes(r.project_id));
  if (!appr.length) return toast('所勾選建案沒有已通過的請款可匯出',true);
  const head = ['建案','樓層','規格','師傅姓名','金額'];
  const rows = appr.map(r=>[projectName(r.project_id), r.floor, r.spec_type, userName(r.worker_id), r.amount]);
  const csv = '﻿' + [head,...rows].map(a=>a.join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = '永豐銀行對帳檔_'+TODAY+'.csv'; a.click();
  toast('已匯出對帳 CSV');
}

/* ===== 共用 ===== */
let toastTimer;
function toast(msg, warn=false){
  const t = document.getElementById('toast'); t.textContent = msg; t.className='toast show'+(warn?' warn':'');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.className='toast', 2800);
}

/* 啟動 */
renderReview();
</script>
