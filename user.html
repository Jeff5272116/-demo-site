<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>師傅請款系統（使用者端）— Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft JhengHei","PingFang TC",system-ui,sans-serif; background:#f4f6f9; color:#1f2937; line-height:1.6; }
  header { background:#1e3a5f; color:#fff; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  header h1 { font-size:18px; font-weight:600; }
  header .sub { font-size:12px; opacity:.75; }
  .who { background:#2563eb; padding:6px 10px 6px 14px; border-radius:999px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .who select { padding:5px 10px; border-radius:999px; border:none; font-size:14px; font-weight:600; cursor:pointer; }
  nav { background:#fff; border-bottom:1px solid #e5e7eb; padding:0 24px; display:flex; gap:4px; flex-wrap:wrap; }
  nav button { background:none; border:none; padding:14px 18px; cursor:pointer; font-size:15px; color:#6b7280; border-bottom:3px solid transparent; }
  nav button.active { color:#1e3a5f; border-bottom-color:#1e3a5f; font-weight:600; }
  nav button:hover { color:#1e3a5f; }
  main { max-width:980px; margin:24px auto; padding:0 24px; }
  .tab { display:none; } .tab.active { display:block; }
  .card { background:#fff; border-radius:10px; padding:22px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:20px; }
  .card h2 { font-size:17px; margin-bottom:4px; }
  .card .hint { font-size:13px; color:#6b7280; margin-bottom:18px; }
  label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:#374151; }
  .field { margin-bottom:16px; }
  select, input { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:7px; font-size:15px; background:#fff; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .amount-box { background:#ecfdf5; border:1px solid #a7f3d0; border-radius:8px; padding:14px 18px; margin:16px 0; font-size:15px; }
  .amount-box b { font-size:24px; color:#047857; }
  .btn { background:#1e3a5f; color:#fff; border:none; padding:11px 22px; border-radius:7px; font-size:15px; cursor:pointer; font-weight:600; }
  .btn:hover { background:#16304f; }
  .btn-sm { padding:6px 12px; font-size:13px; border-radius:6px; }
  .btn-ghost { background:#fff; color:#1e3a5f; border:1px solid #cbd5e1; } .btn-ghost:hover { background:#f1f5f9; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:10px 12px; border-bottom:1px solid #eef0f3; }
  th { font-size:12px; color:#6b7280; background:#fafbfc; }
  .badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; }
  .badge.pending { background:#fef3c7; color:#92400e; }
  .badge.approved { background:#d1fae5; color:#065f46; }
  .badge.rejected { background:#fee2e2; color:#991b1b; }
  .dup-flag { background:#fff7ed; color:#c2410c; border:1px solid #fdba74; font-size:11px; padding:2px 7px; border-radius:5px; margin-left:6px; }
  .empty { text-align:center; color:#9ca3af; padding:30px; font-size:14px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1f2937; color:#fff; padding:12px 22px; border-radius:8px; font-size:14px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:99; }
  .toast.show { opacity:1; } .toast.warn { background:#c2410c; }
</style>
</head>
<body>

<header>
  <div>
    <h1>師傅請款與專案成本管理系統</h1>
  </div>
  <div class="who">👷 <select id="userSel" onchange="switchUser()"></select></div>
</header>

<nav id="nav">
  <button class="active" onclick="showTab('submit',this)">請款提交</button>
  <button onclick="showTab('mine',this)">我的請款紀錄</button>
</nav>

<main>
  <!-- 請款提交（規格 4.1 / 4.2）-->
  <section class="tab active" id="tab-submit">
    <div class="card">
      <h2>請款提交</h2>
      <div class="grid2">
        <div class="field"><label>建案</label><select id="f-project" onchange="onProjectChange()"></select></div>
        <div class="field"><label>樓層</label><select id="f-floor"></select></div>
      </div>
      <div class="grid2">
        <div class="field"><label>規格（制式／客變）</label><select id="f-item" onchange="onItemChange()"></select></div>
        <div class="field"><label>數量</label><input type="number" id="f-qty" min="1" value="1" oninput="calcAmount()"></div>
      </div>
      <div class="amount-box">單價：<b id="o-unit">$0</b> ／ 單位　　預估金額：<b id="o-amount">$0</b></div>
      <button class="btn" onclick="submitBilling()">送出請款</button>
    </div>
  </section>

  <!-- 我的請款紀錄（規格 3：資料隔離）-->
  <section class="tab" id="tab-mine">
    <div class="card">
      <h2>我的請款紀錄</h2>
      <div class="grid2">
        <div class="field"><label>期間起</label><input type="date" id="mine-start" onchange="renderMine()"></div>
        <div class="field"><label>期間迄</label><input type="date" id="mine-end" onchange="renderMine()"></div>
      </div>
      <div class="field"><label>建案</label><select id="mine-project" onchange="renderMine()"></select></div>
      <button class="btn btn-ghost btn-sm" style="margin-bottom:12px" onclick="clearPeriod()">顯示全部期間</button>
      <div class="amount-box" style="background:#eff6ff;border-color:#bfdbfe">指定期間已通過薪資總額：<b id="mine-total" style="color:#1d4ed8">$0</b></div>
      <div id="mine-table"></div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
/* ===== 參照資料（示範用）===== */
// users（規格 5.1）
const USERS = [
  { id:1, name:'張三', account:'chang', role:'worker', status:'啟用' },
  { id:2, name:'李四', account:'lee',   role:'worker', status:'啟用' },
  { id:3, name:'王五', account:'wang',  role:'worker', status:'啟用' },
  { id:9, name:'系統管理者', account:'admin', role:'admin', status:'啟用' },
];
function userName(id){ const u = USERS.find(u=>u.id===id); return u?u.name:('#'+id); }
// projects（規格 5.2）
const PROJECTS = [
  { id:1, name:'建案A', code:'A-001', status:'進行中' },
  { id:2, name:'建案B', code:'B-002', status:'進行中' },
  { id:3, name:'建案C', code:'C-003', status:'進行中' },
  { id:4, name:'建案D', code:'D-004', status:'進行中' },
  { id:5, name:'建案E', code:'E-005', status:'進行中' },
];
function projectName(id){ const p = PROJECTS.find(p=>p.id===id); return p?p.name:('#'+id); }
// unit_prices（規格 5.3）— 工作項目簡化為「制式／客變」，依案名取單價；制式可預填標準數量，客變留空
const UNIT_PRICES = [
  { id:1,  project_id:1, spec_type:'制式', default_qty:10,   unit_price:800  },
  { id:2,  project_id:1, spec_type:'客變', default_qty:null, unit_price:1200 },
  { id:3,  project_id:2, spec_type:'制式', default_qty:8,    unit_price:900  },
  { id:4,  project_id:2, spec_type:'客變', default_qty:null, unit_price:1300 },
  { id:5,  project_id:3, spec_type:'制式', default_qty:10,   unit_price:850  },
  { id:6,  project_id:3, spec_type:'客變', default_qty:null, unit_price:1250 },
  { id:7,  project_id:4, spec_type:'制式', default_qty:12,   unit_price:950  },
  { id:8,  project_id:4, spec_type:'客變', default_qty:null, unit_price:1400 },
  { id:9,  project_id:5, spec_type:'制式', default_qty:6,    unit_price:1000 },
  { id:10, project_id:5, spec_type:'客變', default_qty:null, unit_price:1500 },
];
const FLOORS = ['地下一樓','一樓','二樓','三樓','四樓','五樓'];
const STATUS_LABEL = { pending:'待審核', approved:'已批准', rejected:'已駁回' };
const TODAY = new Date().toISOString().slice(0,10);
function nowTime(){ return new Date().toTimeString().slice(0,8); }

/* 兩張交易資料表（記憶體模擬 DB）*/
let billingSeq = 0, historySeq = 0;
let billing_records = [];   // 規格 5.4
let status_history  = [];   // 規格 5.5
function addHistory(record_id, from_status, to_status, actor_id, note='') {
  status_history.push({ id:++historySeq, record_id, from_status, to_status, actor_id, note, created_at:nowTime() });
}

/* 預植示範資料（每位師傅都有紀錄，方便切換展示）*/
const ADMIN_ID = 9;
function seed(worker_id, project_id, floor, spec_type, quantity, finalStatus, reason, date) {
  const day = date || TODAY;
  const u = UNIT_PRICES.find(x=>x.project_id===project_id && x.spec_type===spec_type);
  const unit_price_snapshot = u.unit_price, amount = unit_price_snapshot*quantity;
  const unique_key = `${project_id}｜${floor}｜${spec_type}｜${day}`;
  const dup = billing_records.some(r=>r.unique_key===unique_key && r.status!=='rejected');
  const r = { id:++billingSeq, worker_id, project_id, floor, item_name:spec_type, spec_type, quantity,
    unit_price_snapshot, amount, unique_key, status:'pending',
    reviewed_by:null, reviewed_at:null, reject_reason:null, submitted_at:day, _suspect:dup };
  billing_records.push(r);
  addHistory(r.id, null, 'pending', worker_id, dup?'疑似重複':'');
  if (finalStatus !== 'pending') {
    r.status = finalStatus; r.reviewed_by = ADMIN_ID; r.reviewed_at = day;
    if (finalStatus==='rejected') r.reject_reason = reason;
    addHistory(r.id, 'pending', finalStatus, ADMIN_ID, reason||'');
  }
}
seed(1, 1, '二樓',     '制式', 10, 'approved', null, '2026-05-20');
seed(1, 2, '三樓',     '制式', 8,  'approved', null, '2026-05-22');
seed(1, 1, '五樓',     '制式', 10, 'pending',  null, '2026-06-02');
seed(2, 3, '一樓',     '制式', 5,  'approved', null, '2026-05-28');
seed(2, 4, '地下一樓', '客變', 3,  'rejected', '數量與現場不符，請重新確認', '2026-06-01');
seed(3, 5, '四樓',     '客變', 6,  'pending',  null, '2026-06-02');
seed(3, 1, '四樓',     '客變', 4,  'approved', null, '2026-05-30');

/* 目前登入的師傅（worker_id）*/
let ME = 1;
function renderUserOptions() {
  const sel = document.getElementById('userSel');
  sel.innerHTML = USERS.filter(u=>u.role==='worker' && u.status==='啟用')
    .map(u=>`<option value="${u.id}">${u.name}（worker_id=${u.id}）</option>`).join('');
  sel.value = ME;
}
function switchUser() {
  ME = +document.getElementById('userSel').value;
  toast('已切換為：'+userName(ME));
  if (document.getElementById('tab-mine').classList.contains('active')) renderMine();
}

/* ===== 分頁 ===== */
function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (id==='mine') renderMine();
}

/* ===== 計價（規格 4.2）===== */
function fillProjects() {
  document.getElementById('f-project').innerHTML = PROJECTS.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('f-floor').innerHTML = FLOORS.map(f=>`<option>${f}</option>`).join('');
  document.getElementById('f-item').innerHTML = `<option value="制式">制式</option><option value="客變">客變</option>`;
  onProjectChange();
}
function onProjectChange() { onItemChange(); }  // 換案名 → 依新案名重新取單價與預填數量
function curRow() {
  const pid = +document.getElementById('f-project').value;
  const spec = document.getElementById('f-item').value;
  return UNIT_PRICES.find(u=>u.project_id===pid && u.spec_type===spec);
}
function onItemChange() {
  const u = curRow();
  // 制式：預填標準數量（可改）；客變：留空由師傅自填（規格 4.1）
  if (u && u.spec_type==='制式' && u.default_qty!=null) document.getElementById('f-qty').value = u.default_qty;
  else document.getElementById('f-qty').value = '';
  calcAmount();
}
function calcAmount() {
  const u = curRow(), qty = +document.getElementById('f-qty').value||0, unit = u?u.unit_price:0;
  document.getElementById('o-unit').textContent = '$'+unit.toLocaleString();
  document.getElementById('o-amount').textContent = '$'+(unit*qty).toLocaleString();
}

/* ===== 提交請款 ===== */
function submitBilling() {
  const u = curRow();
  const floor = document.getElementById('f-floor').value;
  const quantity = +document.getElementById('f-qty').value;
  if (!u || quantity<=0) return toast('請確認規格與數量', true);

  const project_id = u.project_id;
  const spec_type = u.spec_type;
  const unit_price_snapshot = u.unit_price;
  const amount = unit_price_snapshot * quantity;
  const unique_key = `${project_id}｜${floor}｜${spec_type}｜${TODAY}`;
  const dup = billing_records.some(r => r.unique_key===unique_key && r.status!=='rejected');  // 防重複檢查

  const r = {
    id: ++billingSeq, worker_id: ME, project_id, floor,
    item_name: spec_type, spec_type, quantity,
    unit_price_snapshot, amount, unique_key, status: 'pending',
    reviewed_by: null, reviewed_at: null, reject_reason: null,
    submitted_at: TODAY, _suspect: dup,
  };
  billing_records.push(r);
  addHistory(r.id, null, 'pending', ME, dup?'疑似重複':'');

  toast(dup ? '已送出，偵測到疑似重複，將由管理者再次確認' : '請款已送出，狀態：待審核', dup);
  // 送出後切到「我的請款紀錄」讓使用者看到這筆
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-mine').classList.add('active');
  document.querySelectorAll('#nav button').forEach((b,i)=>b.classList.toggle('active', i===1));
  renderMine();
}

/* ===== 我的紀錄（資料隔離）===== */
function clearPeriod() {
  document.getElementById('mine-start').value = '';
  document.getElementById('mine-end').value = '';
  renderMine();
}
function renderMine() {
  const start = document.getElementById('mine-start').value;
  const end = document.getElementById('mine-end').value;
  const proj = document.getElementById('mine-project').value;
  let mine = billing_records.filter(r=>r.worker_id===ME);
  if (start) mine = mine.filter(r=>r.submitted_at >= start);
  if (end)   mine = mine.filter(r=>r.submitted_at <= end);
  if (proj && proj!=='all') mine = mine.filter(r=>String(r.project_id)===proj);
  document.getElementById('mine-total').textContent = '$'+mine.filter(r=>r.status==='approved').reduce((s,r)=>s+r.amount,0).toLocaleString();
  if (!mine.length) {
    const note = (start||end) ? '此期間無紀錄。' : (userName(ME)+' 尚無請款紀錄，請先到「請款提交」送出。');
    document.getElementById('mine-table').innerHTML = '<div class="empty">'+note+'</div>'; return;
  }
  let h = `<table><thead><tr><th>建案</th><th>樓層</th><th>規格</th><th>數量</th><th>金額</th><th>狀態</th><th>提交日期</th></tr></thead><tbody>`;
  mine.forEach(r => {
    h += `<tr><td>${projectName(r.project_id)}</td><td>${r.floor}</td><td>${r.spec_type}${r._suspect?'<span class="dup-flag">疑似重複</span>':''}</td>
      <td>${r.quantity}</td><td>$${r.amount.toLocaleString()}</td><td><span class="badge ${r.status}">${STATUS_LABEL[r.status]}</span></td><td>${r.submitted_at}</td></tr>`;
  });
  document.getElementById('mine-table').innerHTML = h + '</tbody></table>';
}

/* ===== 共用 ===== */
let toastTimer;
function toast(msg, warn=false) {
  const t = document.getElementById('toast'); t.textContent = msg; t.className='toast show'+(warn?' warn':'');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.className='toast', 2800);
}

/* 啟動 */
renderUserOptions();
fillProjects();
document.getElementById('mine-project').innerHTML =
  '<option value="all">全部建案</option>' + PROJECTS.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
</script>
</body>
</html>
