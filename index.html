<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>師傅請款與專案成本管理系統 — Demo 入口</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif; background:#f4f6f9; color:#1f2937; line-height:1.6; min-height:100vh; display:flex; flex-direction:column; }
  header { background:#1e3a5f; color:#fff; padding:18px 24px; }
  header h1 { font-size:20px; font-weight:600; }
  header .sub { font-size:13px; opacity:.8; margin-top:2px; }
  main { flex:1; max-width:860px; width:100%; margin:0 auto; padding:32px 24px; }
  .lead { font-size:15px; color:#374151; margin-bottom:24px; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:640px){ .cards{ grid-template-columns:1fr; } }
  .card { display:block; text-decoration:none; color:inherit; background:#fff; border-radius:12px; padding:26px 24px; box-shadow:0 1px 3px rgba(0,0,0,.08); border:1px solid #eef0f3; transition:transform .12s, box-shadow .12s; }
  .card:hover { transform:translateY(-3px); box-shadow:0 6px 18px rgba(0,0,0,.10); }
  .card .icon { font-size:34px; }
  .card h2 { font-size:18px; margin:10px 0 6px; }
  .card.user h2 { color:#1e3a5f; }
  .card.admin h2 { color:#5b21b6; }
  .card p { font-size:13px; color:#6b7280; }
  .card .go { display:inline-block; margin-top:14px; font-size:14px; font-weight:600; }
  .card.user .go { color:#2563eb; } .card.admin .go { color:#7c3aed; }
  .note { margin-top:28px; font-size:13px; color:#92400e; background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:12px 16px; }
  footer { text-align:center; font-size:12px; color:#9ca3af; padding:18px; }
</style>
</head>
<body>
<header>
  <h1>師傅請款與專案成本管理系統</h1>
  <div class="sub">前端示範（Demo）· 無需登入 · 未串接資料庫</div>
</header>
<main>
  <p class="lead">請依角色點選下方入口進行測試。本示範為純前端，操作不會寫入真實資料庫。</p>
  <div class="cards">
    <a class="card user" href="user.html">
      <div class="icon">👷</div>
      <h2>使用者端（師傅）</h2>
      <p>請款提交、自動計價、查看本人請款紀錄與指定期間薪資總額。</p>
      <span class="go">進入師傅端 →</span>
    </a>
    <a class="card admin" href="admin.html">
      <div class="icon">🛠</div>
      <h2>管理員端（最高管理者）</h2>
      <p>請款審核（單筆／批次）、專案與單價維護、使用者管理、報表儀表板與對帳匯出。</p>
      <span class="go">進入管理者端 →</span>
    </a>
  </div>
  <div class="note">提示：示範資料為固定範例，操作後重新整理頁面即可還原初始狀態。</div>
</main>
<footer>師傅請款與專案成本管理系統 · 前端 Demo</footer>
</body>
</html>
